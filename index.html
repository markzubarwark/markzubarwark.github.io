<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinGo Gold | Professional Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- PREMIUM THEME --- */
        :root { 
            --bg: #0f0f1e; 
            --card-bg: #1a1a2e;
            --accent: #ffd700; /* Gold */
            --blue: #3498db; 
            --red: #e74c3c; 
            --green: #2ecc71; 
            --violet: #9b59b6; 
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; overflow-x: hidden; }

        /* HEADER */
        .navbar { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); font-style: italic; letter-spacing: 1px; }

        /* WALLET CARD */
        .wallet-card { 
            background: linear-gradient(135deg, #1e1e3f 0%, #0f0f1e 100%); 
            padding: 30px 20px; text-align: center; border-radius: 0 0 40px 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.1);
        }
        .bal-label { font-size: 14px; opacity: 0.7; letter-spacing: 1px; }
        .bal-amt { font-size: 38px; font-weight: 800; margin: 10px 0; color: var(--accent); }
        .wallet-actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn-act { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-withdraw { background: rgba(255,255,255,0.1); color: white; }
        .btn-deposit { background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(255,215,0,0.3); }

        /* GAME TABS */
        .tabs { display: flex; justify-content: space-around; background: var(--card-bg); margin: 20px 15px; border-radius: 15px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; cursor: pointer; color: #888; transition: 0.3s; font-weight: 600; }
        .tab.active { background: var(--accent); color: #000; }

        /* GAME BOARD */
        .board { background: var(--card-bg); margin: 0 15px 20px; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .game-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .period-box { font-size: 14px; color: #aaa; }
        .period-id { font-size: 20px; color: white; font-weight: 800; margin-top: 5px; }
        .timer-title { font-size: 12px; color: #aaa; text-align: right; margin-bottom: 5px; text-transform: uppercase; }
        .timer-box { display: flex; gap: 5px; font-size: 24px; font-weight: 900; }
        .digit { background: #2a2a4a; padding: 5px 8px; border-radius: 5px; min-width: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        /* COLORS & NUMBERS */
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .color-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-g { background: var(--green); } .btn-v { background: var(--violet); } .btn-r { background: var(--red); }
        
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .num-btn { aspect-ratio: 1; border-radius: 50%; border: none; color: white; font-weight: 800; font-size: 18px; cursor: pointer; box-shadow: 0 4px 5px rgba(0,0,0,0.3); }
        .n-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); }
        .n-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .n-even { background: var(--red); } .n-odd { background: var(--green); }

        .size-btn { flex: 1; padding: 15px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .big { background: #f39c12; } .small { background: #3498db; }

        /* HISTORY */
        .history { background: var(--card-bg); margin: 0 15px; border-radius: 20px 20px 0 0; }
        .history th { padding: 15px; font-size: 12px; color: #666; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .history td { padding: 15px; text-align: center; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* POPUPS & OVERLAYS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(4px); }
        .bet-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: white; 
            padding: 25px; border-radius: 30px 30px 0 0; z-index: 101; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #333;
        }
        .bet-sheet.active { bottom: 0; }
        .chip-box { display: flex; gap: 8px; margin: 20px 0; }
        .chip { flex: 1; padding: 12px; background: #f0f0f0; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .chip.active { background: var(--accent); border-color: #000; color: #000; }

        /* AD SECTION */
        #adView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; text-align: center; padding-top: 35vh; }
        .ad-timer { font-size: 70px; color: var(--accent); font-weight: 900; margin: 20px; }

        /* ANIMATIONS */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .win-pop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #333; padding: 30px; border-radius: 25px; width: 80%; z-index: 200; text-align: center; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">WIN GO GOLD</div>
    <i class="fas fa-headset" style="color: var(--accent);"></i>
</div>

<div class="wallet-card">
    <div class="bal-label">AVAILABLE BALANCE</div>
    <div class="bal-amt">₹ <span id="balance">0.00</span></div>
    <div class="wallet-actions">
        <button class="btn-act btn-withdraw">WITHDRAW</button>
        <button class="btn-act btn-deposit" onclick="startDeposit()">DEPOSIT</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="setMode(30, this)">30S</div>
    <div class="tab" onclick="setMode(60, this)">1M</div>
    <div class="tab" onclick="setMode(180, this)">3M</div>
    <div class="tab" onclick="setMode(300, this)">5M</div>
</div>

<div class="board">
    <div class="game-info">
        <div>
            <div class="period-box">Period ID</div>
            <div class="period-id" id="pid">---</div>
        </div>
        <div>
            <div class="timer-title">Time Left</div>
            <div class="timer-box">
                <div class="digit" id="m1">0</div><div class="digit" id="m2">0</div>
                <div style="color:var(--accent)">:</div>
                <div class="digit" id="s1">0</div><div class="digit" id="s2">0</div>
            </div>
        </div>
    </div>

    <div class="btn-row">
        <button class="color-btn btn-g" onclick="openBet('Green')">Green</button>
        <button class="color-btn btn-v" onclick="openBet('Violet')">Violet</button>
        <button class="color-btn btn-r" onclick="openBet('Red')">Red</button>
    </div>

    <div class="num-grid" id="numberGrid"></div>

    <div class="btn-row">
        <button class="size-btn big" onclick="openBet('Big')">Big</button>
        <button class="size-btn small" onclick="openBet('Small')">Small</button>
    </div>
</div>

<div class="history">
    <table width="100%">
        <thead><tr><th>Period</th><th>Number</th><th>Size</th><th>Color</th></tr></thead>
        <tbody id="historyList"></tbody>
    </table>
</div>

<div class="overlay" id="overlay" onclick="closeBet()"></div>
<div class="bet-sheet" id="betSheet">
    <div id="betHeader" style="padding: 15px; border-radius: 12px; color: white; font-weight: bold; margin-bottom: 20px;">
        Selected: <span id="selName">---</span>
    </div>
    <p style="margin-bottom: 10px; font-weight: 600;">Amount Per Unit</p>
    <div class="chip-box">
        <div class="chip active" onclick="setChip(1, this)">1</div>
        <div class="chip" onclick="setChip(10, this)">10</div>
        <div class="chip" onclick="setChip(100, this)">100</div>
        <div class="chip" onclick="setChip(1000, this)">1K</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
        <span style="font-weight:bold;">Quantity</span>
        <div style="display:flex; gap:15px; align-items:center;">
            <button onclick="qtyUpdate(-1)" style="width:35px; height:35px; border-radius:50%; border:1px solid #ddd;">-</button>
            <span id="qVal" style="font-weight:900; font-size:18px;">1</span>
            <button onclick="qtyUpdate(1)" style="width:35px; height:35px; border-radius:50%; border:1px solid #ddd;">+</button>
        </div>
    </div>
    <button onclick="confirmBet()" style="width:100%; padding:18px; background:var(--bg); color:white; border:none; border-radius:15px; margin-top:25px; font-weight:bold; font-size:16px;">
        CONFIRM ₹<span id="totAmt">1</span>
    </button>
</div>

<div id="adView">
    <h2 style="color:white;">SECURE SERVER CONNECTION</h2>
    <div class="ad-timer" id="adTimer">5</div>
    <p style="color:#666;">Verifying Session...</p>
    <button id="claimBtn" style="display:none; padding:15px 40px; background:var(--accent); border:none; border-radius:30px; font-weight:bold; margin-top:20px;" onclick="claimBonus()">CLAIM ₹500 BONUS</button>
</div>

<script>
    const AD_LINK = "https://www.profitablecpmratenetwork.com/fi595r98?key=e46995a6d66e900ddc808f640ab3e739";
    let balance = localStorage.getItem('wingo_pro_bal') ? parseFloat(localStorage.getItem('wingo_pro_bal')) : 0;
    let mode = 30; 
    let selectedBet = null;
    let unit = 1;
    let qty = 1;
    let activeBetData = null;

    // INITIALIZE NUMBERS
    window.onload = () => {
        const grid = document.getElementById('numberGrid');
        for(let i=0; i<10; i++){
            let cls = i === 0 ? 'n-0' : (i === 5 ? 'n-5' : (i % 2 === 0 ? 'n-even' : 'n-odd'));
            grid.innerHTML += `<button class="num-btn ${cls}" onclick="openBet(${i})">${i}</button>`;
        }
        updateUI();
        setInterval(gameLoop, 1000);
        // Fill Dummy History
        for(let i=0; i<8; i++) addHistoryRow("20260328" + (1000-i), Math.floor(Math.random()*10));
    };

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(2);
        localStorage.setItem('wingo_pro_bal', balance);
    }

    function gameLoop() {
        const now = new Date();
        const ts = Math.floor(now.getTime() / 1000);
        const rem = mode - (ts % mode);
        
        // Fix Period ID Logic (Remains stable per cycle)
        const periodBase = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
        const cycleCount = Math.floor((now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds()) / mode);
        const currentPid = periodBase + cycleCount.toString().padStart(4, '0');
        document.getElementById('pid').innerText = currentPid;

        // Timer Display
        let m = Math.floor(rem / 60);
        let s = rem % 60;
        document.getElementById('m1').innerText = "0"; document.getElementById('m2').innerText = m;
        document.getElementById('s1').innerText = Math.floor(s/10); document.getElementById('s2').innerText = s % 10;

        // Result Trigger
        if(rem === 1) {
            setTimeout(() => processResult(currentPid), 1000);
        }
    }

    function processResult(pid) {
        const winNum = Math.floor(Math.random() * 10);
        addHistoryRow(pid, winNum);

        if(activeBetData) {
            let won = false;
            let mult = 1.96;
            const resSize = winNum >= 5 ? "Big" : "Small";
            const resColor = [1,3,7,9].includes(winNum) ? "Green" : ([2,4,6,8].includes(winNum) ? "Red" : "Violet");

            if(activeBetData.type === winNum) { won = true; mult = 9; }
            else if(activeBetData.type === "Big" && resSize === "Big") won = true;
            else if(activeBetData.type === "Small" && resSize === "Small") won = true;
            else if(activeBetData.type === "Green" && (resColor === "Green" || winNum === 5)) won = true;
            else if(activeBetData.type === "Red" && (resColor === "Red" || winNum === 0)) won = true;
            else if(activeBetData.type === "Violet" && (winNum === 0 || winNum === 5)) { won = true; mult = 4.5; }

            if(won) {
                let prize = activeBetData.amt * mult;
                balance += prize;
                alert("WINNER! Received ₹" + prize.toFixed(2));
            }
            activeBetData = null;
            updateUI();
        }
    }

    function addHistoryRow(pid, n) {
        const size = n >= 5 ? "Big" : "Small";
        const color = [1,3,7,9].includes(n) ? "Green" : ([2,4,6,8].includes(n) ? "Red" : "Violet");
        const cHex = color === "Green" ? "#2ecc71" : (color === "Red" ? "#e74c3c" : "#9b59b6");
        
        const row = `<tr>
            <td>${pid}</td>
            <td style="color:${cHex}">${n}</td>
            <td>${size}</td>
            <td><div style="width:12px;height:12px;border-radius:50%;background:${cHex};margin:auto;"></div></td>
        </tr>`;
        const list = document.getElementById('historyList');
        list.innerHTML = row + list.innerHTML;
        if(list.children.length > 15) list.removeChild(list.lastChild);
    }

    // BETTING ACTIONS
    function openBet(val) {
        selectedBet = val;
        unit = 1; qty = 1;
        document.getElementById('selName').innerText = val;
        document.getElementById('totAmt').innerText = "1";
        document.getElementById('qVal').innerText = "1";
        
        let header = document.getElementById('betHeader');
        if(isNaN(val)) {
            header.style.background = val === "Green" ? "#2ecc71" : (val === "Red" ? "#e74c3c" : (val === "Violet" ? "#9b59b6" : "#f39c12"));
        } else {
            header.style.background = "#1a1a2e";
        }

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('betSheet').classList.add('active');
    }

    function closeBet() {
        document.getElementById('betSheet').classList.remove('active');
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    }

    function setChip(v, el) {
        unit = v;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updateTotal();
    }

    function qtyUpdate(v) {
        if(qty + v >= 1) qty += v;
        updateTotal();
    }

    function updateTotal() {
        document.getElementById('qVal').innerText = qty;
        document.getElementById('totAmt').innerText = unit * qty;
    }

    function confirmBet() {
        const total = unit * qty;
        if(balance < total) { alert("Insufficient Balance!"); return; }
        
        balance -= total;
        activeBetData = { type: selectedBet, amt: total };
        updateUI();
        closeBet();
        alert("Bet Placed!");
    }

    // AD SYSTEM
    function startDeposit() {
        window.open(AD_LINK, '_blank');
        document.getElementById('adView').style.display = 'block';
        let count = 5;
        const itv = setInterval(() => {
            count--;
            document.getElementById('adTimer').innerText = count;
            if(count <= 0) {
                clearInterval(itv);
                document.getElementById('claimBtn').style.display = 'inline-block';
            }
        }, 1000);
    }

    function claimBonus() {
        balance += 500;
        updateUI();
        document.getElementById('adView').style.display = 'none';
        document.getElementById('claimBtn').style.display = 'none';
        alert("₹500 Bonus Credited!");
    }

    function setMode(m, el) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
